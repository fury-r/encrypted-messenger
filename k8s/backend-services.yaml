apiVersion: v1
kind: ConfigMap
metadata:
  name: messenger-config
data:
  GRPC_BACKEND_ADDR: backend:8082
  MIDDLEWARE_PORT: "8081"
  SOCKET_PORT: "3001"
---
apiVersion: v1
kind: Secret
metadata:
  name: messenger-secrets
type: Opaque
stringData:
  JWT_SECRET_KEY: replace-with-a-real-secret
  RABBITMQ_DEFAULT_USER: replace-rabbitmq-user
  RABBITMQ_DEFAULT_PASS: replace-rabbitmq-password
  RABBITMQ_URL: amqp://replace-rabbitmq-user:replace-rabbitmq-password@rabbitmq:5672/
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: messenger-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: messenger-secrets
                  key: RABBITMQ_DEFAULT_PASS
          readinessProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/fury-r/encrypted-messenger/backend:latest
          ports:
            - containerPort: 8082
          env:
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: messenger-secrets
                  key: JWT_SECRET_KEY
          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - name: grpc
      port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: middleware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: middleware
  template:
    metadata:
      labels:
        app: middleware
    spec:
      containers:
        - name: middleware
          image: ghcr.io/fury-r/encrypted-messenger/middleware:latest
          ports:
            - containerPort: 8081
          env:
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: messenger-config
                  key: MIDDLEWARE_PORT
            - name: GRPC_BACKEND_ADDR
              valueFrom:
                configMapKeyRef:
                  name: messenger-config
                  key: GRPC_BACKEND_ADDR
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: messenger-secrets
                  key: RABBITMQ_URL
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: middleware
spec:
  selector:
    app: middleware
  ports:
    - name: grpc
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: socket-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: socket-server
  template:
    metadata:
      labels:
        app: socket-server
    spec:
      containers:
        - name: socket-server
          image: ghcr.io/fury-r/encrypted-messenger/socket-server:latest
          ports:
            - containerPort: 3001
          env:
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: messenger-config
                  key: SOCKET_PORT
            - name: GRPC_BACKEND_ADDR
              valueFrom:
                configMapKeyRef:
                  name: messenger-config
                  key: GRPC_BACKEND_ADDR
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: messenger-secrets
                  key: RABBITMQ_URL
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: socket-server
spec:
  selector:
    app: socket-server
  ports:
    - name: http
      port: 3001
      targetPort: 3001
